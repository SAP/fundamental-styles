<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <title>storybook - Storybook</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />
    
    <style>
      @font-face {
        font-family: 'Nunito Sans';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url('./sb-common-assets/nunito-sans-regular.woff2') format('woff2');
      }

      @font-face {
        font-family: 'Nunito Sans';
        font-style: italic;
        font-weight: 400;
        font-display: swap;
        src: url('./sb-common-assets/nunito-sans-italic.woff2') format('woff2');
      }

      @font-face {
        font-family: 'Nunito Sans';
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: url('./sb-common-assets/nunito-sans-bold.woff2') format('woff2');
      }

      @font-face {
        font-family: 'Nunito Sans';
        font-style: italic;
        font-weight: 700;
        font-display: swap;
        src: url('./sb-common-assets/nunito-sans-bold-italic.woff2') format('woff2');
      }
    </style>

    <link href="./sb-manager/runtime.js" rel="modulepreload" />

    
    <link href="./sb-addons/storybook-core-server-presets-0/common-manager-bundle.js" rel="modulepreload" />
    
    <link href="./sb-addons/links-1/manager-bundle.js" rel="modulepreload" />
    
    <link href="./sb-addons/a11y-2/manager-bundle.js" rel="modulepreload" />
    
    <link href="./sb-addons/docs-3/manager-bundle.js" rel="modulepreload" />
    
    <link href="./sb-addons/chromatic-com-storybook-4/manager-bundle.js" rel="modulepreload" />
    
    <link href="./sb-addons/storybook-5/manager-bundle.js" rel="modulepreload" />
      <style>
    /* Hide the "Open context menu" button on sidebar nav items */
    .sidebar-item button[data-testid='context-menu'] {
        display: none !important;
    }

    /* Sidebar item spacing and alignment */
    .sidebar-item {
        padding-block: 0.25rem;
        padding-inline: 0.5rem;
        display: flex !important;
        align-items: center !important;
        min-height: 1.75rem !important;
        margin-block-end: 0.125rem !important;
        font-weight: 400 !important;
    }

    /* Group/folder headers get bolder font */
    .sidebar-item[data-nodetype='group'],
    .sidebar-item[data-nodetype='root'] {
        font-weight: 600 !important;
    }
</style>
 

    <style>
      #storybook-root[hidden] {
        display: none !important;
      }
    </style>

    
  </head>
  <body>
    <div id="root"></div>

    
    <script>
      
        
          window['FEATURES'] = {
  "argTypeTargetsV7": true,
  "legacyDecoratorFileOrder": false,
  "disallowImplicitActionsInRenderV8": true,
  "viewport": true,
  "highlight": true,
  "controls": true,
  "interactions": true,
  "actions": true,
  "backgrounds": true,
  "outline": true,
  "measure": true,
  "sidebarOnboardingChecklist": true,
  "componentsManifest": false
};
        
      
        
          window['REFS'] = {};
        
      
        
          window['LOGLEVEL'] = "info";
        
      
        
          window['DOCS_OPTIONS'] = {
  "defaultName": "Docs",
  "docsMode": true
};
        
      
        
          window['CONFIG_TYPE'] = "PRODUCTION";
        
      
        
      
        
      
        
          window['TAGS_OPTIONS'] = {};
        
      
        
          window['STORYBOOK_BUILDER'] = "vite";
        
      
        
          window['STORYBOOK_FRAMEWORK'] = "html-vite";
        
      
        
          window['STORYBOOK_RENDERER'] = "html";
        
      
        
      
    </script>
    

    <script type="module">
      import './sb-manager/globals-runtime.js';

      
        import './sb-addons/storybook-core-server-presets-0/common-manager-bundle.js';
      
        import './sb-addons/links-1/manager-bundle.js';
      
        import './sb-addons/a11y-2/manager-bundle.js';
      
        import './sb-addons/docs-3/manager-bundle.js';
      
        import './sb-addons/chromatic-com-storybook-4/manager-bundle.js';
      
        import './sb-addons/storybook-5/manager-bundle.js';
      

      import './sb-manager/runtime.js';
    </script>
  </body>
</html>
